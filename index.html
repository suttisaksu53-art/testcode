                return Swal.fire('แจ้งเตือน', 'กรุณาปักจุดหรือนำเข้าขอบเขตพื้นที่ก่อนทำการบันทึกแผนที่', 'info');
            }

            Swal.fire({ title: 'กำลังจัดทำ Layout แผนที่...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            
            const mapWrapper = document.getElementById('map-wrapper');
            const mapContainer = document.getElementById('map');

            // เตรียม Layout สำหรับการพิมพ์
            mapContainer.classList.remove('absolute', 'inset-0');
            mapContainer.classList.add('flex-1', 'border-[3px]', 'border-gray-800', 'relative', 'z-10');
            mapWrapper.classList.add('p-6', 'md:p-10', 'bg-white', 'flex', 'flex-col');
            
            // ส่วนหัว (Header)
            const header = document.createElement('div');
            header.id = 'print-header';
            header.className = 'mb-4 border-b-2 border-gray-800 pb-3 flex justify-between items-end shrink-0 z-10';
            header.innerHTML = `
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold text-gray-900" style="font-family: 'Prompt', sans-serif;">แผนที่แสดงจุดเก็บตัวอย่างดิน</h1>
                    <p class="text-sm text-gray-600 mt-1">วันที่จัดทำ: ${new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' })}</p>
                </div>
                <div class="text-right">
                    <p class="text-lg font-semibold text-emerald-700 bg-emerald-50 px-3 py-1 rounded border border-emerald-200">
                        รวม: ${samplePoints.length} จุด
                    </p>
                </div>
            `;
            mapWrapper.insertBefore(header, mapContainer);

            // ส่วนคำอธิบายสัญลักษณ์ (Footer / Legend)
            const footer = document.createElement('div');
            footer.id = 'print-footer';
            footer.className = 'mt-4 pt-3 border-t-2 border-gray-800 flex justify-between items-center text-sm text-gray-800 shrink-0 z-10';
            
            const pointColor = document.getElementById('point-color').value;
            const isCircle = document.getElementById('point-shape').value === 'circle';
            
            let footerHtml = `
                <div class="flex items-center gap-6 font-medium flex-wrap">
                    <div class="flex items-center gap-2">
                        <span style="background-color: ${pointColor}; width: 14px; height: 14px; border-radius: ${isCircle ? '50%' : '0'}; border: 1px solid #000;"></span>
                        จุดเก็บตัวอย่าง
                    </div>`;

            // เพิ่ม Legend สำหรับทุก Shapefile ที่ใช้งานอยู่
            Object.values(shpLayers).forEach(shp => {
                if(shp.visible !== false) {
                    footerHtml += `
                        <div class="flex items-center gap-2">
                            <span style="background-color: ${shp.color}40; width: 18px; height: 18px; border: 2px solid ${shp.color};"></span>
                            ${shp.name.length > 20 ? shp.name.substring(0, 20) + '...' : shp.name}
                        </div>`;
                }
            });

            footerHtml += `
                </div>
                <div class="text-xs text-gray-500 whitespace-nowrap ml-4">ระบบอ้างอิงพิกัด: WGS 84</div>
            `;
            footer.innerHTML = footerHtml;
            mapWrapper.appendChild(footer);

            map.invalidateSize();

            // รอ 1.5 วิ ให้กระเบื้องโหลด
            setTimeout(async () => {
                try {
                    const canvas = await html2canvas(mapWrapper, { 
                        useCORS: true, 
                        allowTaint: false,
                        backgroundColor: '#ffffff',
                        scale: 2 
                    });
                    
                    canvas.toBlob(function(blob) {
                        if (blob) {
                            const url = window.URL.createObjectURL(blob);
                            const link = document.createElement('a');
                            link.download = `Soil_Map_Layout_${new Date().getTime()}.jpg`;
                            link.href = url;
                            document.body.appendChild(link);
                            link.click();
                            document.body.removeChild(link);
                            window.URL.revokeObjectURL(url);
                            Swal.fire({ icon: 'success', title: 'บันทึกแผนที่สำเร็จ!', showConfirmButton: false, timer: 1500 });
                        } else {
                            Swal.fire('ข้อผิดพลาด', 'สร้างไฟล์ภาพไม่สำเร็จ', 'error');
                        }
                    }, "image/jpeg", 0.95);

                } catch (err) {
                    console.error("Export error:", err);
                    Swal.fire('ข้อผิดพลาด', 'ไม่สามารถบันทึกภาพได้', 'error');
                } finally {
                    header.remove();
                    footer.remove();
                    mapWrapper.classList.remove('p-6', 'md:p-10', 'bg-white', 'flex', 'flex-col');
                    mapContainer.classList.remove('flex-1', 'border-[3px]', 'border-gray-800', 'relative', 'z-10');
                    mapContainer.classList.add('absolute', 'inset-0');
                    map.invalidateSize();
                }
            }, 1500); 
        });

        // --- 12. Load points from URL on start ---
        function loadPointsFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const ptsParam = urlParams.get('pts');
            
            if (ptsParam) {
                const ptsArray = ptsParam.split('|');
                let imported = 0;
                
                ptsArray.forEach(ptStr => {
                    const coords = ptStr.split(',');
                    if (coords.length === 2) {
                        const lat = parseFloat(coords[0]);
                        const lng = parseFloat(coords[1]);
                        if (!isNaN(lat) && !isNaN(lng)) {
                            addPointToMap(lat, lng);
                            imported++;
                        }
                    }
                });
                
                if (imported > 0) {
                    // Zoom to fit all newly loaded points
                    const group = new L.featureGroup(samplePoints.map(p => p.marker));
                    map.fitBounds(group.getBounds(), { padding: [50, 50] });
                    
                    Swal.fire({
                        icon: 'success',
                        title: 'สำเร็จ',
                        text: `โหลดข้อมูลจากลิงก์เรียบร้อยแล้ว (${imported} จุด)`,
                        timer: 2000,
                        showConfirmButton: false
                    });
                }
            }
        }
        
        // Trigger URL parse logic right after initialization
        loadPointsFromURL();

        // --- 13. Mobile Sidebar Toggle ---
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        
        function toggleSidebar() {
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
            // สั่งให้แผนที่ประมวลผลขนาดหน้าจอใหม่เมื่อมีการดึงเมนูเข้า-ออก
            setTimeout(() => { map.invalidateSize(); }, 300);
        }

        document.getElementById('mobile-menu-btn').addEventListener('click', toggleSidebar);
        document.getElementById('close-sidebar-btn').addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', toggleSidebar);

    </script>
</body>
</html>
